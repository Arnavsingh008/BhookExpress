services:

  backend:
    build: ./Backend
    container_name: bhook-backend
    ports:
      - "4000:4000"
    env_file:
      - ./Backend/.env
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bhook-network

  frontend:
    build: ./frontend
    container_name: bhook-frontend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.docker
    depends_on:
      - backend
    networks:
      - bhook-network

  admin:
    build: ./admin
    container_name: bhook-admin
    ports:
      - "5174:5174"
    env_file:
      - ./admin/.env.docker
    depends_on:
      - backend
    networks:
      - bhook-network

  mongodb:
    image: mongo:latest
    container_name: bhook-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - bhook-network
    

volumes:
  mongodb_data:

networks:
  bhook-network:
    driver: bridge